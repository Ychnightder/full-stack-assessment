
services:
  db:
    image: postgis/postgis:15-3.5
    container_name: bridge-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  importerData:
     image: python:3.13.10-slim-bookworm
     container_name: bridge-importer
     depends_on:
     - db
     working_dir: /scripts
     volumes:
     - ./scripts:/scripts
     command: >
        sh -c "pip install psycopg2-binary &&
              python import_csv_to_db.py"
     env_file:
       - ./.env
  TesterData:
     image: python:3.13.10-slim-bookworm
     container_name: bridge-tester
     depends_on:
       - importerData
     working_dir: /scripts
     volumes:
       - ./scripts:/scripts
     command: >
       sh -c "pip install psycopg2-binary &&
             python verify_import_csv_to_db.py"
     env_file:
       - ./.env
  backend:
       build: ./backend
       container_name: bridge-backend
       depends_on:
         - db
       env_file:
         - ./.env
       ports:
         - "8000:8000"
       volumes:
         - ./backend:/app
  frontend:
     build: ./frontend
     container_name: HydroMap-frontend
     ports:
       - "4200:4200"
     volumes:
       - ./frontend:/app
       - /app/node_modules
     depends_on:
       - backend
     restart: unless-stopped
      
      
volumes:
  postgres_data:
